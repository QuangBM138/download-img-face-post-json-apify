<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSON Image Downloader</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
</head>
<body class="bg-gray-100 min-h-screen py-10 px-4 font-sans">

    <div class="max-w-4xl mx-auto bg-white p-6 rounded-xl shadow-md">
        <h1 class="text-2xl font-bold text-gray-800 mb-4 text-center">Bulk Image Downloader from JSON</h1>
        
        <div class="mb-4">
            <label class="block text-sm font-semibold text-gray-700 mb-2">Paste your JSON data here:</label>
            <textarea id="jsonInput" rows="8" class="w-full p-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 font-mono text-sm" placeholder='[{"image": "url_1", ...}, ...]'></textarea>
        </div>

        <div class="flex flex-wrap gap-3 mb-6">
            <button id="btnProcess" class="bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 px-5 rounded-lg shadow transition duration-200 cursor-pointer">
                Parse & Preview
            </button>
            <button id="btnDownloadAll" class="bg-green-600 hover:bg-green-700 text-white font-medium py-2 px-5 rounded-lg shadow transition duration-200 hidden cursor-pointer">
                Download All (.ZIP)
            </button>
        </div>

        <div id="status" class="text-sm font-medium text-blue-600 mb-4 hidden"></div>

        <div id="previewSection" class="hidden">
            <h2 id="previewTitle" class="text-lg font-semibold text-gray-800 mb-3 border-b pb-2">Detected Images:</h2>
            <div id="imageGrid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-4">
                </div>
        </div>
    </div>

    <script>
        const jsonInput = document.getElementById('jsonInput');
        const btnProcess = document.getElementById('btnProcess');
        const btnDownloadAll = document.getElementById('btnDownloadAll');
        const status = document.getElementById('status');
        const previewSection = document.getElementById('previewSection');
        const previewTitle = document.getElementById('previewTitle');
        const imageGrid = document.getElementById('imageGrid');

        let imageUrls = [];

        // PROCESS JSON & SHOW PREVIEW
        btnProcess.addEventListener('click', () => {
            let rawData = jsonInput.value.trim();
            
            // Clean up common trailing characters or commas from bad copy-pastes
            if (rawData.endsWith(',]')) rawData = rawData.replace(',]', ']');
            if (rawData.endsWith(',')) rawData = rawData.slice(0, -1);
            if (!rawData.endsWith(']') && !rawData.includes(']')) rawData += ']';

            try {
                const data = JSON.parse(rawData);
                imageUrls = data.map(item => item.image).filter(url => url);

                if (imageUrls.length === 0) {
                    alert('No valid image URLs found in the JSON.');
                    return;
                }

                // Update UI & Render Preview
                previewTitle.innerText = `Detected Images (${imageUrls.length}):`;
                imageGrid.innerHTML = '';
                
                imageUrls.forEach((url, index) => {
                    const card = document.createElement('div');
                    card.className = "bg-gray-50 p-2 border border-gray-200 rounded-lg flex flex-col justify-between items-center";
                    card.innerHTML = `
                        <img src="${url}" class="w-full h-32 object-cover rounded mb-2 text-xs text-gray-400" alt="Failed to load / CORS blocked">
                        <a href="${url}" target="_blank" class="text-xs text-blue-500 hover:underline truncate w-full text-center">View original</a>
                    `;
                    imageGrid.appendChild(card);
                });

                previewSection.classList.remove('hidden');
                btnDownloadAll.classList.remove('hidden');
                status.classList.add('hidden');

            } catch (error) {
                alert('Invalid JSON format! Please check your syntax.\nDetails: ' + error.message);
            }
        });

        // DOWNLOAD IMAGES & PACK INTO ZIP
        btnDownloadAll.addEventListener('click', async () => {
            if (imageUrls.length === 0) return;

            btnDownloadAll.disabled = true;
            btnDownloadAll.innerText = "Processing...";
            status.classList.remove('hidden');
            status.innerText = "Initializing download...";

            const zip = new JSZip();

            for (let i = 0; i < imageUrls.length; i++) {
                const url = imageUrls[i];
                status.innerText = `Downloading image ${i + 1} of ${imageUrls.length}...`;

                try {
                    // Fetch image data as Blob
                    const response = await fetch(url);
                    if (!response.ok) throw new Error("Network response error");
                    const blob = await response.blob();
                    
                    // Add to zip file archive (e.g., image_1.jpg, image_2.jpg...)
                    zip.file(`image_${i + 1}.jpg`, blob);
                } catch (err) {
                    console.error("Failed to download image: " + url, err);
                    status.innerText = `Failed to download image ${i + 1}. Skipping...`;
                }
            }

            status.innerText = "Generating ZIP file...";
            
            // Compile zip and trigger download
            zip.generateAsync({ type: "blob" }).then(function (content) {
                saveAs(content, "downloaded_images.zip");
                status.innerText = "Download completed successfully!";
                btnDownloadAll.disabled = false;
                btnDownloadAll.innerText = "Download All (.ZIP)";
            }).catch(err => {
                alert("Error compiling zip archive: " + err.message);
                btnDownloadAll.disabled = false;
                btnDownloadAll.innerText = "Download All (.ZIP)";
            });
        });
    </script>
</body>
</html>
